<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Campus Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow border-0" style="width: 100%; max-width: 400px;">
        <div class="card-header bg-dark text-white text-center py-3">
            <h4 class="mb-0">Staff Login</h4>
        </div>
        <div class="card-body p-4">
            
            {% if form.errors %}
                <div class="alert alert-danger shadow-sm">Invalid username or password.</div>
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label text-muted">Username</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">Sign In</button>
            </form>
            
        </div>
    </div>

</body>
</html>
